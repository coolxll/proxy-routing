[custom]
; 自用分流规则 - 绕过大陆
; 去广告用 geosite:category-ads-all，其余自维护
; 规则按从上到下首次命中：专用策略必须放在通用 GeoSite / GeoIP 规则之前

; 私有地址
ruleset=🎯 直连,https://raw.githubusercontent.com/coolxll/proxy-routing/main/rules/private.list
; 广告拦截
ruleset=🛑 拦截,[]GEOSITE,category-ads-all
; 大流量（必须放在 Google 前，避免 googlevideo.com 被 DOMAIN-KEYWORD,google 提前匹配）
ruleset=⬇️ 大流量,https://raw.githubusercontent.com/coolxll/proxy-routing/main/rules/traffic-heavy.list
; Google & Gemini
ruleset=Google,https://raw.githubusercontent.com/coolxll/proxy-routing/main/rules/google.list
; AI 平台
ruleset=🤖 AI,https://raw.githubusercontent.com/coolxll/proxy-routing/main/rules/ai.list
; GitHub
ruleset=📦 GitHub,https://raw.githubusercontent.com/coolxll/proxy-routing/main/rules/github.list
; Telegram
ruleset=✈️ Telegram,https://raw.githubusercontent.com/coolxll/proxy-routing/main/rules/telegram.list
; 银行网站（默认直连）
ruleset=🏦 银行,https://raw.githubusercontent.com/coolxll/proxy-routing/main/rules/bank.list
; DMM / FANZA（必须放在 geolocation-!cn 前）
ruleset=🇯🇵 日本,[]GEOSITE,dmm
; 额外直连补充
ruleset=🎯 直连,https://raw.githubusercontent.com/coolxll/proxy-routing/main/rules/direct.list
; 通用代理补充
ruleset=🌐 代理,https://raw.githubusercontent.com/coolxll/proxy-routing/main/rules/proxy.list
; 中国域名直连（geosite 底座）
ruleset=🎯 直连,[]GEOSITE,cn
; 海外域名代理（geosite 底座）
ruleset=🌐 代理,[]GEOSITE,geolocation-!cn
; 中国 IP 直连（放在所有域名规则之后，避免抢先命中）
ruleset=🎯 直连,[]GEOIP,CN
; 兜底
ruleset=🐟 漏网之鱼,[]FINAL

custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=Google`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=🤖 AI`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=🏦 银行`select`[]DIRECT`[]🚀 节点选择`.*
custom_proxy_group=📦 GitHub`select`[]🚀 节点选择`[]♻️ 自动选择`.*
custom_proxy_group=⬇️ 大流量`select`[]♻️ 自动选择`[]🚀 节点选择`[]DIRECT`.*
custom_proxy_group=✈️ Telegram`select`[]🚀 节点选择`[]♻️ 自动选择`.*
custom_proxy_group=🌐 代理`select`[]🚀 节点选择`[]♻️ 自动选择`.*
custom_proxy_group=🎯 直连`select`[]DIRECT`[]🚀 节点选择`.*
custom_proxy_group=🛑 拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🇯🇵 日本`url-test`(日本|Japan|JP|东京|大阪)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]🎯 直连`[]♻️ 自动选择`.*

enable_rule_generator=true
overwrite_original_rules=true
